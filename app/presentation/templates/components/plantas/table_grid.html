<div
    class="row g-3"
>

    {% for planta in plantas %}

    <div class="col-md-4 col-lg-3">

        <div class="card h-100 shadow-sm border-0">

            <div class="card-body">

                <div class="text-center mb-3">

                    <div class="plant-avatar mx-auto mb-2">

                        {% if planta.photo_url %}

                        <img
                            src="{{ planta.photo_url }}"
                            alt="{{ planta.tag }}"
                        >

                        {% else %}

                        <img
                            src="{{ url_for('static', filename='img/default-plant.png') }}"
                            alt="Sin imagen"
                        >

                        {% endif %}

                    </div>

                    <h6 class="fw-bold mb-0">
                        {{ planta.tag }}
                    </h6>

                    <small class="text-muted">
                        {{ planta.common_name }}
                    </small>

                </div>

                <div class="mb-2">

                    <small class="text-muted">
                        Ubicación
                    </small>

                    <div>
                        {{ planta.location.name }}
                    </div>

                </div>

                <div class="mb-2">

                    <small class="text-muted">
                        Estado
                    </small>

                    <div>

                        <span class="badge bg-success-subtle text-success">

                            {{ planta.status }}

                        </span>

                    </div>

                </div>

                <div class="mb-3">

                    <small class="text-muted">
                        Germinación
                    </small>

                    <div>
                        {{ planta.germination_date }}
                    </div>

                </div>

                <div class="d-flex gap-2">

                    <a
                        href="{{ url_for('planta.detalle_planta', planta_id=planta.id) }}"
                        class="btn btn-light btn-sm flex-fill"
                    >
                        <i class="bi bi-eye"></i>
                    </a>

                    <form
                        method="POST"
                        action="{{ url_for('planta.eliminar_planta', planta_id=planta.id) }}"
                    >

                        <button
                            class="btn btn-light btn-sm"
                        >
                            <i class="bi bi-trash"></i>
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    {% endfor %}

</div>
