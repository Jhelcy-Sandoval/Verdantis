<div class="card shadow-sm mb-4">

    <div class="card-header">
        Registrar Planta
    </div>

    <div class="card-body">

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('planta.crear_planta') }}">

            <div class="row g-3">

                <div class="col-md-4">

                    <label class="form-label">
                        Tag
                    </label>

                    <input type="text" name="tag" class="form-control" placeholder="PL-001" required>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Nombre Común
                    </label>

                    <input type="text" name="common_name" class="form-control" placeholder="Tomate Cherry" required>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Especie
                    </label>

                    <select name="especie_id" class="form-select" required>

                        <option value="">
                            Seleccione una especie
                        </option>

                        {% for especie in especies %}

                        <option value="{{ especie.id }}">
                            {{ especie.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Variedad
                    </label>

                    <input type="text" name="variety" class="form-control" placeholder="Cherry, Roma, Beefsteak...">

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Ubicación
                    </label>

                    <select name="location_id" class="form-select" required>

                        <option value="">
                            Seleccione una ubicacion
                        </option>

                        {% for location in locations %}

                        <option value="{{ location.id }}">
                            {{ location.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Fecha de Germinación
                    </label>

                    <input type="date" name="germination_date" class="form-control" required>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Fotografía
                    </label>

                    <input type="file" name="photo" class="form-control" accept="image/*">

                </div>

            </div>

            <div class="mt-3">

                <label class="form-label">
                    Condiciones Iniciales
                </label>

                <textarea name="initial_conditions" class="form-control" rows="4"
                    placeholder="Observaciones, sustrato, temperatura inicial, humedad, etc."></textarea>

            </div>

            <div class="mt-4 d-flex justify-content-end">

                <button type="submit" class="btn btn-success">
                    <i class="bi bi-floppy"></i>
                    Guardar Planta
                </button>

            </div>

        </form>

    </div>

</div>
