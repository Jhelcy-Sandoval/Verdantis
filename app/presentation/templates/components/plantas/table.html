<div class="card dashboard-table shadow-sm">

    <div class="card-body">

        <form method="GET" class="d-flex justify-content-between align-items-center mb-4">

            <div class="d-flex flex-wrap gap-2">

                <div class="search-box">

                    <i class="bi bi-search"></i>

                    <input type="text" name="search" class="form-control" placeholder="Buscar planta..."
                        value="{{ request.args.get('search', '') }}">

                </div>

                <select name="location" class="form-select filter-select">

                    <option value="">
                        Ubicación: Todas
                    </option>

                    {% for location in locations %}

                    <option value="{{ location.id }}">
                        {{ location.name }}
                    </option>

                    {% endfor %}

                </select>

                <select name="status" class="form-select filter-select">

                    <option value="">
                        Estado: Todos
                    </option>

                    <option value="Crecimiento">
                        Crecimiento
                    </option>

                    <option value="Observacion">
                        Observación
                    </option>

                    <option value="Alerta">
                        Alerta
                    </option>

                </select>

                <button type="submit" class="btn btn-light">

                    <i class="bi bi-funnel"></i>

                    Filtros

                </button>

            </div>

            <div class="d-flex gap-2">

                <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#plantaModal">
                    <i class="bi bi-plus-lg"></i>
                    Agregar Planta
                </button>

                <button type="button" id="gridViewBtn" class="btn btn-light">
                    <i class="bi bi-grid"></i>
                </button>

                <button type="button" id="listViewBtn" class="btn btn-success">
                    <i class="bi bi-list"></i>
                </button>
            </div>

        </form>

        <div id="plantsListView">
            {% include "components/plantas/table_view.html" %}
        </div>

        <div id="plantsGridView" class="d-none">
            {% include "components/plantas/table_grid.html" %}
        </div>

    </div>

</div>
