<div class="row g-3 mb-4">

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle  p-3 me-3 content-icon d-flex align-items-center justify-content-center">

                    <i class="bi bi-flower1 fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        Total de plantas
                    </small>

                    <h4 class="mb-1">
                        {{ total_plantas }}
                    </h4>

                    <small class="text-success">
                        {{ vs_mes_anterior}}
                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center">

                    <i class="bi bi-check-circle fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        En buen estado
                    </small>

                    <h4 class="mb-1">
                        {{ plantas_saludables }}
                    </h4>

                    <small class="text-success">
                        <i class="bi bi-circle-fill metric-dot"></i>
                        {{ porcentaje_saludables }}
                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center">

                    <i class="bi bi-eye fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        En observación
                    </small>

                    <h4 class="mb-1">
                        {{ plantas_observacion }}
                    </h4>

                    <small class="text-warning ">
                        <i class="bi bi-circle-fill metric-dot"></i>
                        {{ porcentaje_observacion }}
                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center">

                    <i class="bi bi-exclamation-triangle fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        Con alertas
                    </small>

                    <h4 class="mb-1">
                        {{ plantas_alerta }}
                    </h4>

                    <small class="text-danger">
                        <i class="bi bi-circle-fill metric-dot"></i>
                        {{ porcentaje_alerta }}
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>
