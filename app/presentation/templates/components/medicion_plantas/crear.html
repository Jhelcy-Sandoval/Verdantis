<div class="card shadow-sm mb-4">

    <div class="card-header">
        Registrar inspección de la planta
    </div>

    <div class="card-body">

        <form
            method="POST"
            enctype="multipart/form-data"
            action="{{ url_for('planta.crear_medicion_planta', planta_id=planta.id) }}"
        >

            <input
                type="hidden"
                name="planta_id"
                value="{{ planta.id }}"
            >

            <div class="row g-3">

                <div class="col-md-4">

                    <label class="form-label">
                        Altura (cm)
                    </label>

                    <input
                        type="number"
                        step="0.1"
                        name="altura"
                        class="form-control"
                        placeholder="35.5"
                        required
                    >

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Diámetro del tallo (cm)
                    </label>

                    <input
                        type="number"
                        step="0.1"
                        name="diametro_tallo"
                        class="form-control"
                        placeholder="1.8"
                    >

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Desarrollo (%)
                    </label>

                    <input
                        type="number"
                        min="0"
                        max="100"
                        step="0.1"
                        name="desarrollo"
                        class="form-control"
                        placeholder="75"
                    >

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Número de hojas
                    </label>

                    <input
                        type="number"
                        min="0"
                        name="numero_hojas"
                        class="form-control"
                        placeholder="18"
                    >

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Número de flores
                    </label>

                    <input
                        type="number"
                        min="0"
                        name="numero_flores"
                        class="form-control"
                        placeholder="4"
                    >

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Número de frutos
                    </label>

                    <input
                        type="number"
                        min="0"
                        name="numero_frutos"
                        class="form-control"
                        placeholder="2"
                    >

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Humedad del sustrato (%)
                    </label>

                    <input
                        type="number"
                        min="0"
                        max="100"
                        step="0.1"
                        name="humedad_sustrato"
                        class="form-control"
                        placeholder="65"
                    >

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Color de las hojas
                    </label>

                    <select
                        name="color_hojas"
                        class="form-select"
                    >

                        <option value="">
                            Seleccione un color
                        </option>

                        <option value="Verde">
                            Verde
                        </option>

                        <option value="Verde claro">
                            Verde claro
                        </option>

                        <option value="Amarillo">
                            Amarillo
                        </option>

                        <option value="Marrón">
                            Marrón
                        </option>

                        <option value="Secas">
                            Secas
                        </option>

                    </select>

                </div>

                <div class="col-md-6">

                    <div class="form-check mt-4">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            name="plagas"
                            id="plagas"
                        >

                        <label
                            class="form-check-label"
                            for="plagas"
                        >

                            Presenta plagas

                        </label>

                    </div>

                </div>

                <div class="col-md-6">

                    <div class="form-check mt-4">

                        <input
                            class="form-check-input"
                            type="checkbox"
                            name="enfermedad"
                            id="enfermedad"
                        >

                        <label
                            class="form-check-label"
                            for="enfermedad"
                        >

                            Presenta enfermedad

                        </label>

                    </div>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Fotografía
                    </label>

                    <input
                        type="file"
                        name="photo"
                        class="form-control"
                        accept="image/*"
                    >

                </div>

            </div>

            <div class="mt-3">

                <label class="form-label">
                    Observaciones
                </label>

                <textarea
                    name="observaciones"
                    rows="4"
                    class="form-control"
                    placeholder="Observaciones de la inspección..."
                ></textarea>

            </div>

            <div class="mt-4 d-flex justify-content-end">

                <button
                    type="submit"
                    class="btn btn-success"
                >

                    <i class="bi bi-clipboard2-check"></i>

                    Registrar inspección

                </button>

            </div>

        </form>

    </div>

</div>
