<div class="row g-3 mb-4">

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center"
                >

                    <i class="bi bi-flower1 fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        Total Especies
                    </small>

                    <h4 class="mb-1">
                        {{ total_especies }}
                    </h4>

                    <small class="text-success">
                        {{ vs_mes_anterior }}
                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center"
                >

                    <i class="bi bi-emoji-smile fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        Fácil Cultivo
                    </small>

                    <h4 class="mb-1">
                        {{ especies_faciles }}
                    </h4>

                    <small class="text-success">

                        <i class="bi bi-circle-fill metric-dot"></i>

                        {{ porcentaje_faciles }}

                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center"
                >

                    <i class="bi bi-graph-up-arrow fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        Crecimiento Rápido
                    </small>

                    <h4 class="mb-1">
                        {{ especies_rapidas }}
                    </h4>

                    <small class="text-success">

                        <i class="bi bi-circle-fill metric-dot"></i>

                        {{ porcentaje_rapidas }}

                    </small>

                </div>

            </div>

        </div>

    </div>

    <div class="col-md-3">

        <div class="card shadow-sm h-100">

            <div class="card-body d-flex align-items-center">

                <div
                    class="rounded-circle p-3 me-3 content-icon d-flex align-items-center justify-content-center"
                >

                    <i class="bi bi-tree fs-4"></i>

                </div>

                <div>

                    <small class="text-muted">
                        En Uso
                    </small>

                    <h4 class="mb-1">
                        {{ especies_en_uso }}
                    </h4>

                    <small class="text-success">

                        <i class="bi bi-circle-fill metric-dot"></i>

                        {{ porcentaje_en_uso }}

                    </small>

                </div>

            </div>

        </div>

    </div>

</div>
