<div class="card dashboard-table shadow-sm">

    <div class="card-body">

        <form method="GET" class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div class="d-flex flex-wrap gap-2">

                <div class="search-box">

                    <i class="bi bi-search"></i>

                    <input type="text" name="search" class="form-control" placeholder="Buscar especie..."
                        value="{{ request.args.get('search', '') }}">

                </div>

                <select name="difficulty" class="form-select filter-select">

                    <option value="">
                        Dificultad: Todas
                    </option>

                    <option value="Fácil">
                        Fácil
                    </option>

                    <option value="Media">
                        Media
                    </option>

                    <option value="Difícil">
                        Difícil
                    </option>

                </select>

                <select name="growth" class="form-select filter-select">

                    <option value="">
                        Crecimiento: Todos
                    </option>

                    <option value="Lento">
                        Lento
                    </option>

                    <option value="Medio">
                        Medio
                    </option>

                    <option value="Rápido">
                        Rápido
                    </option>

                </select>

                <select name="origin" class="form-select filter-select">

                    <option value="">
                        Origen: Todos
                    </option>

                    <option value="global">
                        Globales
                    </option>

                    <option value="custom">
                        Personalizadas
                    </option>

                </select>

                <button type="submit" class="btn btn-light">

                    <i class="bi bi-funnel"></i>

                    Filtrar

                </button>

            </div>

            <div class="d-flex gap-2">

                <button type="button" class="btn btn-success agregar_especie" data-bs-toggle="modal"
                    data-bs-target="#especieModal">

                    <i class="bi bi-plus-lg"></i>

                    Agregar Especie

                </button>

                <button type="button" id="gridEspViewBtn" class="btn btn-light">

                    <i class="bi bi-grid"></i>

                </button>

                <button type="button" id="listEspViewBtn" class="btn btn-success">

                    <i class="bi bi-list"></i>

                </button>

            </div>

        </form>
        
        <div id="especieListView">
            {% include "components/especies/table_view.html" %}
        </div>

        <div id="especieGridView" class="d-none">
            {% include "components/especies/table_grid.html" %}
        </div>

    </div>

</div>
