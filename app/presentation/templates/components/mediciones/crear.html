<div class="card shadow-sm mb-4">

    <div class="card-header">
        Registrar Medición
    </div>

    <div class="card-body">

        <form method="POST" action="{{ url_for('mediciones.crear_medicion') }}">

            <div class="row g-3">

                <div class="col-md-6">

                    <label class="form-label">
                        Ubicación
                    </label>

                    <select name="location_id" class="form-select" required>

                        <option value="">
                            Seleccione una ubicación
                        </option>

                        {% for location in locations %}

                        <option value="{{ location.id }}">
                            {{ location.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Temperatura (°C)
                    </label>

                    <input type="number" step="0.1" name="temperatura" class="form-control" required>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Humedad (%)
                    </label>

                    <input type="number" step="0.1" name="humedad" class="form-control" required>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Desarrollo (%)
                    </label>

                    <input type="number" min="0" max="100" step="0.1" name="desarrollo" class="form-control" required>

                </div>

            </div>

            <div class="mt-3">

                <label class="form-label">
                    Observaciones
                </label>

                <textarea name="observaciones" rows="4" class="form-control"></textarea>

            </div>

            <div class="mt-4 d-flex justify-content-end">

                <button type="submit" class="btn btn-success">

                    <i class="bi bi-floppy"></i>

                    Registrar Medición

                </button>

            </div>

        </form>

    </div>

</div>
