<div class="card dashboard-table shadow-sm">

    <div class="card-body">

        <form method="GET" class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div class="d-flex flex-wrap gap-2">

                <div class="search-box">

                    <i class="bi bi-search"></i>

                    <input type="text" name="search" class="form-control" placeholder="Buscar medición..."
                        value="{{ request.args.get('search', '') }}">

                </div>

                <select name="location" class="form-select filter-select">

                    <option value="">
                        Ubicación: Todas
                    </option>

                    {% for location in locations %}

                    <option value="{{ location.id }}" {% if request.args.get('location')==location.id|string %} selected
                        {% endif %}>

                        {{ location.name }}

                    </option>

                    {% endfor %}

                </select>

                <button type="submit" class="btn btn-light">

                    <i class="bi bi-funnel"></i>

                    Filtrar

                </button>

            </div>

            <div class="d-flex gap-2">

                <button 
                    type="button" 
                    class="btn btn-success agregar_medicion" 
                    data-bs-toggle="modal"
                    data-bs-target="#medicionModal">
                    <i class="bi bi-plus-lg"></i>
                    Agregar Medición
                </button>

                <button type="button" id="gridMedViewBtn" class="btn btn-light">

                    <i class="bi bi-grid"></i>

                </button>

                <button type="button" id="listMedViewBtn" class="btn btn-success">

                    <i class="bi bi-list"></i>

                </button>

            </div>

        </form>

        {% if mediciones %}

        <div id="medicionesListView">

            {% include "components/mediciones/table_view.html" %}

        </div>

        <div id="medicionesGridView" class="d-none">

            {% include "components/mediciones/table_grid.html" %}

        </div>

        {% else %}

        <div class="text-center py-5">

            <i class="bi bi-search fs-1 text-muted"></i>

            <h5 class="mt-3">

                No se encontraron mediciones

            </h5>

            <p class="text-muted mb-4">

                No existen mediciones que coincidan con los filtros seleccionados.

            </p>

            <a href="{{ url_for('mediciones.listar_mediciones_ubicaciones') }}" class="btn btn-outline-success">

                <i class="bi bi-arrow-clockwise"></i>

                Limpiar filtros

            </a>

        </div>

        {% endif %}

    </div>

</div>
