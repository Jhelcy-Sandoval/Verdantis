<div class="card dashboard-table shadow-sm">

    <div class="card-body">

        <form method="GET" class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

            <div class="d-flex flex-wrap gap-2">

                <div class="search-box">

                    <i class="bi bi-search"></i>

                    <input type="text" name="search" class="form-control" placeholder="Buscar ubicacion..."
                        value="{{ request.args.get('search', '') }}">

                </div>

                <button type="submit" class="btn btn-light">

                    <i class="bi bi-funnel"></i>

                    Filtrar

                </button>

            </div>

            <div class="d-flex gap-2">

                <button type="button" class="btn btn-success agregar_ubicacion" data-bs-toggle="modal"
                    data-bs-target="#locationModal">

                    <i class="bi bi-plus-lg"></i>

                    Agregar Ubicacion

                </button>

            </div>

        </form>

        <div>
            {% include "components/locations/table_view.html" %}
        </div>

    </div>

</div>
