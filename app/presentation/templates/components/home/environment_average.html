<div class="component h-100">

    <div class="card-header">
        Condiciones ambientales promedio
    </div>

    <div class="card-body">

        <div class="row g-3">

            <div class="col-6">

                <div class="metric-card text-center">

                    <i class="bi bi-thermometer-half fs-3 text-danger mb-2"></i>

                    <small class="text-muted d-block">
                        Temperatura
                    </small>

                    <h4 class="mb-0">
                        {{ dashboard.condiciones.temperatura_promedio }} °C
                    </h4>

                </div>

            </div>

            <div class="col-6">

                <div class="metric-card text-center">

                    <i class="bi bi-droplet-half fs-3 text-primary mb-2"></i>

                    <small class="text-muted d-block">
                        Humedad
                    </small>

                    <h4 class="mb-0">
                        {{ dashboard.condiciones.humedad_promedio }} %
                    </h4>

                </div>

            </div>

        </div>

        <hr>

        <div class="d-flex justify-content-between align-items-center py-2">

            <span>

                <i class="bi bi-exclamation-circle text-warning"></i>

                Mediciones en alerta

            </span>

            <strong>

                {{ dashboard.condiciones.mediciones_alerta }}

            </strong>

        </div>

        <div class="d-flex justify-content-between align-items-center py-2">

            <span>

                <i class="bi bi-pie-chart text-success"></i>

                Porcentaje de alerta

            </span>

            <strong>

                {{ dashboard.condiciones.porcentaje_alerta }}

            </strong>

        </div>

    </div>

</div>
